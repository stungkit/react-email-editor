name: Bug report
description: Report a bug in the react-email-editor React component (wrapper). For editor behavior itself, use Unlayer support instead.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        This repo covers the **React wrapper component** only (mounting, props, refs, events, TypeScript types).
        Bugs inside the editor itself (drag-and-drop, tools, HTML export, rendering) should go to [Unlayer support](https://unlayer.com/help).
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened, and what did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce, ideally with a minimal code snippet or a CodeSandbox/StackBlitz link.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: react-email-editor version
      placeholder: e.g. 1.7.11
    validations:
      required: true
  - type: input
    id: react-version
    attributes:
      label: React version and framework
      placeholder: e.g. React 19.2 with Next.js 15 (App Router)
    validations:
      required: true
